# .github/workflows/add-file.yml
name: Add file from URL

on:
  workflow_dispatch:
    inputs:
      url:
        description: 'Direct download URL of the file'
        required: true
        type: string

permissions:
  contents: write   # Required to push the new file back to the repo

jobs:
  download-and-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download file to repo root
        run: |
          # -L follows redirects, -J uses server-suggested filename (Content-Disposition),
          # -O uses URL basename as fallback. The file lands in the current directory (repo root).
          curl -LJO "${{ github.event.inputs.url }}"

      - name: Commit and push file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Add file from ${{ github.event.inputs.url }}" || echo "No changes to commit"
          git push
